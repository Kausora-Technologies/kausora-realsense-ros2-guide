# Kausora Technologies — D455 Camera Configuration
# Intel RealSense D455 — Long-range depth camera
# Range: up to 6m | FOV: 87° × 58° (depth), 90° × 65° (color)

/camera/d455:
  ros__parameters:
    camera_name: "d455"
    camera_namespace: "camera"
    serial_no: ""

    # Color stream
    enable_color: true
    color_width: 1280
    color_height: 720
    color_fps: 30.0

    # Depth stream
    enable_depth: true
    depth_width: 1280
    depth_height: 720
    depth_fps: 30.0

    # Infrared streams
    enable_infra1: false
    enable_infra2: false
    infra_width: 1280
    infra_height: 720
    infra_fps: 30.0

    # IMU — D455 HAS a built-in IMU (BMI085 gyro + accel), disabled by default
    enable_gyro: false
    enable_accel: false
    gyro_fps: 400.0
    accel_fps: 250.0
    unite_imu_method: ""

    # Depth processing
    pointcloud.enable: false
    align_depth.enable: false
    clip_distance: -1.0     # -1.0 = disable clipping

    initial_reset: false
    publish_tf: true
    tf_publish_rate: 0.0
